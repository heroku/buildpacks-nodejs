name: Coverage

on:
  workflow_dispatch:
  push:
    branches: ["ccasey/coverage-workflow"]

permissions:
  contents: read

jobs:
  coverage:
    name: Generate unified coverage report
    runs-on: ubuntu-24.04

    env:
      LIBCNB_COVERAGE: "1"
      INTEGRATION_TEST_CNB_BUILDER: heroku/builder:24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Update Rust toolchain
        run: rustup update

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cargo-nextest

      - name: Install Pack CLI
        uses: buildpacks/github-actions/setup-pack@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0

      - name: Install musl-tools and target
        run: |
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Disable containerd snapshotter
        run: |
          sudo mkdir -p /etc/docker
          echo '{"features":{"containerd-snapshotter":false}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Pull builder and run images
        run: |
          docker pull "$INTEGRATION_TEST_CNB_BUILDER"
          RUN_IMAGE=$(docker inspect --format='{{index .Config.Labels "io.buildpacks.builder.metadata"}}' "$INTEGRATION_TEST_CNB_BUILDER" | jq -r '.stack.runImage.image')
          docker pull "${RUN_IMAGE}"

      - name: Run unit tests with coverage
        run: cargo llvm-cov --no-report --workspace --locked

      - name: Run integration tests with coverage
        run: cargo nextest run --run-ignored only --locked

      - name: Merge profraw files
        run: |
          LLVM_PROFDATA=$(find "$(rustc --print sysroot)" -name "llvm-profdata" | head -1)
          "$LLVM_PROFDATA" merge -sparse \
            target/llvm-cov-target/*.profraw \
            target/coverage/profraw/*.profraw \
            -o target/coverage/unified.profdata

      - name: Collect instrumented binaries
        id: binaries
        run: |
          IGNORE_REGEX='/.cargo/|/rustc/|/libcnb|/test_support/'
          echo "ignore_regex=$IGNORE_REGEX" >> "$GITHUB_OUTPUT"

          OBJECTS=""

          # Unit test binaries (compiled by cargo-llvm-cov)
          for bin in target/llvm-cov-target/debug/deps/*; do
            if [ -f "$bin" ] && [ -x "$bin" ] && [[ "$bin" != *.d ]] && [[ "$bin" != *.o ]] && [[ "$bin" != *.rmeta ]] && [[ "$bin" != *.rlib ]] && [[ "$(basename "$bin")" != lib* ]]; then
              OBJECTS="$OBJECTS -object=$bin"
            fi
          done

          # Integration test binaries (cross-compiled for Docker via libcnb-test)
          for bin in target/x86_64-unknown-linux-musl/debug/*; do
            if [ -f "$bin" ] && [ -x "$bin" ] && [[ "$bin" != *.d ]] && [[ "$bin" != *.o ]]; then
              OBJECTS="$OBJECTS -object=$bin"
            fi
          done

          echo "objects=$OBJECTS" >> "$GITHUB_OUTPUT"

      - name: Generate unified coverage report
        run: |
          LLVM_COV=$(find "$(rustc --print sysroot)" -name "llvm-cov" | head -1)
          OBJECTS="${{ steps.binaries.outputs.objects }}"
          IGNORE_REGEX="${{ steps.binaries.outputs.ignore_regex }}"

          "$LLVM_COV" show $OBJECTS \
            --instr-profile=target/coverage/unified.profdata \
            --ignore-filename-regex="$IGNORE_REGEX" \
            --format=html --output-dir=target/coverage/html

          "$LLVM_COV" export $OBJECTS \
            --instr-profile=target/coverage/unified.profdata \
            --ignore-filename-regex="$IGNORE_REGEX" \
            --format=lcov > target/coverage/lcov.info

      - name: Write coverage summary
        run: |
          LLVM_COV=$(find "$(rustc --print sysroot)" -name "llvm-cov" | head -1)
          OBJECTS="${{ steps.binaries.outputs.objects }}"
          IGNORE_REGEX="${{ steps.binaries.outputs.ignore_regex }}"

          echo '## Code Coverage Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          "$LLVM_COV" report $OBJECTS \
            --instr-profile=target/coverage/unified.profdata \
            --ignore-filename-regex="$IGNORE_REGEX" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check coverage threshold
        run: |
          LLVM_COV=$(find "$(rustc --print sysroot)" -name "llvm-cov" | head -1)
          OBJECTS="${{ steps.binaries.outputs.objects }}"
          IGNORE_REGEX="${{ steps.binaries.outputs.ignore_regex }}"

          TOTAL_LINE=$("$LLVM_COV" report $OBJECTS \
            --instr-profile=target/coverage/unified.profdata \
            --ignore-filename-regex="$IGNORE_REGEX" | tail -1)
          COVERAGE=$(echo "$TOTAL_LINE" | awk '{print $(NF-3)}' | tr -d '%')

          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "::warning::Coverage ${COVERAGE}% is below 50% threshold"
          fi

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "coverage-report-${{github.sha}}"
          path: |
            target/coverage/html
            target/coverage/lcov.info
          if-no-files-found: "error"
