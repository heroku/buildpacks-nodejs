version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "rust"
      - "skip changelog"
    groups:
      libcnb:
        patterns:
          - "libcnb"
          - "libcnb-*"
          - "libherokubuildpack"
          - "sha2"
      rust-dependencies:
        update-types:
          - "minor"
          - "patch"
        # Work around: https://github.com/dependabot/dependabot-core/issues/11093
        exclude-patterns:
          - "libcnb"
          - "libcnb-*"
          - "libherokubuildpack"
          - "sha2"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github actions"
      - "skip changelog"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
