[package]
name = "nodejs-data"
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
fun_run = "0.6"
libherokubuildpack = { version = "=0.30.3", default-features = false, features = [
    "inventory",
    "inventory-sha2",
] }
node-semver = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10.9"
